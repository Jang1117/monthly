<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENG팀 월간 일정표</title>
  <style>
    :root {
      --bg: #eef4ff;
      --panel: #ffffff;
      --primary: #4f46e5;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --yang: #f87171;
      --jang: #60a5fa;
      --kwon: #34d399;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: linear-gradient(135deg, #dbeafe, #e0e7ff);
      color: var(--text);
      padding: 16px;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      max-width: 1320px;
      margin: 0 auto;
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.16);
      backdrop-filter: blur(10px);
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* (styles copied from index.html for parity) */
    header { display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:16px; flex-shrink:0; }
    h1 { margin:0; font-size:1.85rem; }
    .controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    button { border:none; border-radius:999px; padding:10px 14px; font-size:0.95rem; cursor:pointer; transition:transform .2s ease, box-shadow .2s ease; }
    .primary-btn { background: var(--primary); color:white; box-shadow: 0 8px 18px rgba(79,70,229,0.2); }
    .secondary-btn { background:#f3f4f6; color:#374151; }
    .legend { display:flex; gap:10px; flex-wrap:wrap; margin:12px 0 18px; flex-shrink:0; }
    .legend-item { display:flex; align-items:center; gap:6px; padding:7px 10px; background:#f8fafc; border:1px solid var(--line); border-radius:999px; font-size:0.92rem; color:#334155; }
    .legend-dot { width:10px; height:10px; border-radius:50%; }
    .calendar { position:relative; flex:1; min-height:0; display:grid; grid-template-columns:repeat(7, minmax(0,1fr)); grid-template-rows: auto repeat(var(--rows, 5), 1fr); gap:10px; overflow:hidden; }
    .event-bar { position:absolute; height:30px; border-radius:16px; color:white; font-size:0.83rem; padding:0 12px; display:flex; align-items:center; justify-content:space-between; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; box-shadow:0 6px 16px rgba(15,23,42,0.18); z-index:5; }
    .day-name { text-align:center; padding:8px; background:#f8fafc; border:1px solid var(--line); border-radius:12px; font-weight:700; color:#475569; }
    .day-cell { min-height:0; overflow:hidden; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:10px; display:flex; flex-direction:column; gap:8px; position:relative; }
    .day-cell.range-selected { box-shadow: inset 0 0 0 3px rgba(79,70,229,0.12); background: linear-gradient(90deg, rgba(99,102,241,0.04), rgba(99,102,241,0.02)); }
    .day-cell.drag-active { outline: 2px dashed rgba(79,70,229,0.15); }
    .day-cell.outside { opacity:0.55; background:#f8fafc; }
    .day-cell.today { border: 2px solid rgba(79,70,229,0.55); }
    .day-number { font-weight:700; font-size:0.95rem; }
    .day-events { display:flex; flex-direction:column; gap:6px; flex:1; }
    .modal { position:fixed; inset:0; background:rgba(15,23,42,0.45); display:none; align-items:center; justify-content:center; padding:20px; z-index:1000; overflow:auto; }
    .modal.active { display:flex; }
    .modal-card { width:min(520px,100%); background:white; border-radius:18px; padding:24px; box-shadow:0 20px 55px rgba(15,23,42,0.24); }
    .user-picker { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:12px 0 16px; }
    .user-btn { padding:10px 8px; border:1px solid var(--line); border-radius:12px; background:#f8fafc; color:#334155; font-weight:700; }
    .user-btn.yang.active { background: rgba(248,113,113,0.12); border-color: var(--yang); color: var(--yang); }
    .user-btn.jang.active { background: rgba(96,165,250,0.12); border-color: var(--jang); color: var(--jang); }
    .user-btn.kwon.active { background: rgba(52,211,153,0.12); border-color: var(--kwon); color: var(--kwon); }
    .type-picker { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; margin-top:6px; }
    .type-btn { padding:10px 8px; border:1px solid var(--line); border-radius:12px; background:#f8fafc; color:#334155; font-weight:700; cursor:pointer; }
    .type-btn.active { color: white; }
    .type-btn.general.active { background: var(--primary); border-color: var(--primary); }
    .type-btn.business.active { background: #ef4444; border-color: #ef4444; }
    .type-btn.vacation.active { background: #f59e0b; border-color: #f59e0b; }
    .type-btn.external.active { background: #0ea5e9; border-color: #0ea5e9; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .form-row.time-row { grid-template-columns: minmax(0,1fr) minmax(0,1fr) minmax(0,100px); align-items:flex-start; }
    .checkbox-group label { display:inline-flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; min-height:60px; padding:10px 8px; border:1px solid var(--line); border-radius:12px; background:#f8fafc; text-align:center; font-size:0.86rem; }
    input, textarea { width:100%; border:1px solid var(--line); border-radius:10px; padding:10px 12px; font:inherit; color:var(--text); }
    textarea { min-height:72px; }
    .modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:16px; }
    .danger-btn { background:#fee2e2; color:#b91c1c; }

    .event-bar.dragging { opacity:0.9; transform: translateY(-2px); box-shadow: 0 12px 30px rgba(15,23,42,0.28); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>📅 ENG팀 월간 일정표</h1>
      </div>
      <div class="controls">
        <div class="month-nav">
          <button class="secondary-btn" onclick="prevMonth()">◀</button>
          <span id="monthLabel">2026년 7월</span>
          <button class="secondary-btn" onclick="nextMonth()">▶</button>
        </div>
        <button class="secondary-btn" onclick="goToday()">오늘</button>
        <button class="primary-btn" onclick="openModal(formatDateKey(currentDate))">+ 일정 추가</button>
      </div>
    </header>

    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background: var(--yang);"></span>양성민</div>
      <div class="legend-item"><span class="legend-dot" style="background: var(--jang);"></span>장승호</div>
      <div class="legend-item"><span class="legend-dot" style="background: var(--kwon);"></span>권두훈</div>
    </div>

    <div class="calendar" id="calendar"></div>
  </div>

  <div class="modal" id="eventModal">
    <div class="modal-card">
      <h3 id="modalTitle">새 일정 추가</h3>
      <div class="user-picker">
        <button type="button" class="user-btn yang active" data-user="yang">양성민</button>
        <button type="button" class="user-btn jang" data-user="jang">장승호</button>
        <button type="button" class="user-btn kwon" data-user="kwon">권두훈</button>
      </div>

      <div class="form-group">
        <label>일정 종류</label>
        <div class="type-picker">
          <button type="button" class="type-btn general active" data-type="general">회의</button>
          <button type="button" class="type-btn business" data-type="business">출장</button>
          <button type="button" class="type-btn vacation" data-type="vacation">휴일</button>
          <button type="button" class="type-btn external" data-type="external">외부활동</button>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="startDate">시작 날짜</label>
          <input type="date" id="startDate" />
        </div>
        <div class="form-group">
          <label for="endDate">종료 날짜</label>
          <input type="date" id="endDate" />
        </div>
      </div>

      <div class="form-row time-row">
        <div class="form-group">
          <label for="startTime">시작 시간</label>
          <input type="time" id="startTime" value="09:00" />
        </div>
        <div class="form-group">
          <label for="endTime">종료 시간</label>
          <input type="time" id="endTime" value="10:00" />
        </div>
        <div class="form-group checkbox-group">
          <label for="allDayCheckbox">
            <input type="checkbox" id="allDayCheckbox" />
            <span>All Day</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label for="memo">메모</label>
        <textarea id="memo" placeholder="간단한 메모를 입력하세요."></textarea>
      </div>

      <div class="modal-actions">
        <button type="button" class="secondary-btn" onclick="closeModal()">취소</button>
        <button type="button" class="danger-btn" id="deleteBtn" onclick="deleteCurrentEvent()">삭제</button>
        <button type="button" class="primary-btn" onclick="saveEvent()">저장</button>
      </div>
    </div>
  </div>

  <script>
    const userMeta = {
      yang: { name: '양성민', color: '#f87171' },
      jang: { name: '장승호', color: '#60a5fa' },
      kwon: { name: '권두훈', color: '#34d399' }
    };

    const typeMeta = {
      general: { label: '회의', color: '#4f46e5' },
      business: { label: '출장', color: '#ef4444' },
      vacation: { label: '휴일', color: '#f59e0b' },
      external: { label: '외부활동', color: '#0ea5e9' }
    };

    const API_BASE_URL = 'https://monthly-uur4.onrender.com'; // 외부 API 호스트를 입력하세요. 로컬 서버 사용 시 ''로 비워두세요.

    let currentDate = new Date();
    let events = [];
    let selectedUsers = ['yang'];
    let selectedType = 'general';
    let editingEventId = null;
    let dragSelection = null;
    let dragEventState = null;

    function getApiUrl(path) {
      return API_BASE_URL ? `${API_BASE_URL}${path}` : `${location.origin}${path}`;
    }

    function normalizeEvents(list) {
      if (!Array.isArray(list)) return [];
      return list.map((ev, index) => {
        const startDate = ev.startDate || ev.date || formatDateKey(new Date());
        let users = Array.isArray(ev.users) ? ev.users.filter(u => userMeta[u]) : (ev.user ? [ev.user] : []);
        if (users.length === 0) users = ['yang'];
        return {
          id: ev.id || ev.id === 0 ? String(ev.id) : (ev.id || `${Date.now()}-${index}`),
          startDate,
          endDate: ev.endDate || ev.date || startDate,
          startTime: ev.startTime || ev.time || '09:00',
          endTime: ev.endTime || ev.endTime || '10:00',
          title: ev.title || '',
          memo: ev.memo || '',
          users,
          type: ev.type || 'general',
          allDay: !!ev.allDay
        };
      });
    }

    function formatDateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function formatMonthLabel(date) {
      return `${date.getFullYear()}년 ${date.getMonth() + 1}월`;
    }

    function formatDateLabel(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      return `${y}.${String(m).padStart(2, '0')}.${String(d).padStart(2, '0')}`;
    }

    function addDays(dateStr, days) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const date = new Date(y, m - 1, d);
      date.setDate(date.getDate() + days);
      return formatDateKey(date);
    }

    function isSameDate(a, b) {
      return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    }

    function isDateInRange(date, startDate, endDate) {
      const key = formatDateKey(date);
      return key >= startDate && key <= endDate;
    }

    function getEventTimeLabel(event) {
      return `${event.startTime} - ${event.endTime}`;
    }

    function getTypeLabel(type = 'general') {
      return typeMeta[type]?.label || typeMeta.general.label;
    }

    async function loadEvents() {
      try {
        const res = await fetch(getApiUrl('/events'));
        if (!res.ok) throw new Error('API returned ' + res.status);
        const list = await res.json();
        events = normalizeEvents(list);
        renderCalendar();
      } catch (e) {
        console.warn('Failed to load events from server, falling back to localStorage', e);
        try {
          const stored = JSON.parse(localStorage.getItem('monthlyScheduleEvents') || '[]');
          events = normalizeEvents(stored);
        } catch (ee) {
          events = [];
        }
        renderCalendar();
      }
    }

    async function apiCreateEvent(ev) {
      try {
        const res = await fetch(getApiUrl('/events'), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(ev) });
        if (!res.ok) throw new Error('API create failed ' + res.status);
        return res.json();
      } catch (e) {
        // fallback: save to localStorage
        const list = JSON.parse(localStorage.getItem('monthlyScheduleEvents') || '[]');
        const id = Date.now().toString();
        const created = { ...ev, id };
        list.push(created);
        localStorage.setItem('monthlyScheduleEvents', JSON.stringify(list));
        return created;
      }
    }

    async function apiUpdateEvent(id, ev) {
      try {
        const res = await fetch(getApiUrl(`/events/${id}`), { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(ev) });
        if (!res.ok) throw new Error('API update failed ' + res.status);
      } catch (e) {
        // fallback: update localStorage
        const list = JSON.parse(localStorage.getItem('monthlyScheduleEvents') || '[]');
        const updated = list.map(item => item.id === id ? { ...item, ...ev, id } : item);
        localStorage.setItem('monthlyScheduleEvents', JSON.stringify(updated));
      }
    }

    async function apiDeleteEvent(id) {
      try {
        const res = await fetch(getApiUrl(`/events/${id}`), { method: 'DELETE' });
        if (!res.ok) throw new Error('API delete failed ' + res.status);
      } catch (e) {
        // fallback: delete from localStorage
        const list = JSON.parse(localStorage.getItem('monthlyScheduleEvents') || '[]');
        const updated = list.filter(item => item.id !== id);
        localStorage.setItem('monthlyScheduleEvents', JSON.stringify(updated));
      }
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const first = new Date(year, month, 1);
      const last = new Date(year, month + 1, 0);
      const firstDay = (first.getDay() + 7) % 7;
      const daysInMonth = last.getDate();
      const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
      const today = new Date();

      const calendar = document.getElementById('calendar');
      calendar.innerHTML = '';
      calendar.style.setProperty('--rows', totalCells / 7);
      const dateKeys = [];
      const cellMap = {};

      ['일','월','화','수','목','금','토'].forEach(name => {
        const dayName = document.createElement('div');
        dayName.className = 'day-name';
        dayName.textContent = name;
        calendar.appendChild(dayName);
      });

      for (let i = 0; i < totalCells; i++) {
        const date = new Date(year, month, i - firstDay + 1);
        const isOutside = date.getMonth() !== month;
        const isToday = isSameDate(date, today);
        const dateKey = formatDateKey(date);
        const [rangeStart, rangeEnd] = dragSelection ? [dragSelection.startDate, dragSelection.endDate].sort() : [];
        const shouldHighlight = dragSelection && dragSelection.active && isDateInRange(date, rangeStart, rangeEnd);

        const cell = document.createElement('div');
        cell.className = `day-cell${isOutside ? ' outside' : ''}${isToday ? ' today' : ''}${shouldHighlight ? ' range-selected' : ''}`;
        cell.dataset.date = dateKey;

        const number = document.createElement('div');
        number.className = 'day-number';
        number.textContent = date.getDate();
        cell.appendChild(number);

        const eventBox = document.createElement('div');
        eventBox.className = 'day-events';
        cell.appendChild(eventBox);

        dateKeys.push(dateKey);
        cellMap[dateKey] = cell;

        cell.addEventListener('mousedown', (e) => {
          if (e.target.closest('button') || e.target.closest('.event-chip')) return;
          e.preventDefault();
          dragSelection = { active: true, startDate: dateKey, endDate: dateKey };
          cell.classList.add('drag-active');
          renderCalendar();
        });

        cell.addEventListener('mouseenter', () => {
          if (dragSelection && dragSelection.active) {
            dragSelection.endDate = dateKey;
            renderCalendar();
          }
        });

        calendar.appendChild(cell);
      }

      document.getElementById('monthLabel').textContent = formatMonthLabel(currentDate);
      renderEventBars(dateKeys, cellMap);
    }

    function renderEventBars(dateKeys, cellMap) {
      const calendar = document.getElementById('calendar');
      calendar.querySelectorAll('.event-bar').forEach(el => el.remove());
      const rows = Math.ceil(dateKeys.length / 7);
      // Per row, track which date-ranges occupy each vertical slot so only
      // segments that actually overlap in date get stacked below one another.
      const rowSlots = Array.from({ length: rows }, () => []);

      events.forEach(ev => {
        const eventStart = ev.startDate;
        const eventEnd = ev.endDate;
        const visibleStart = dateKeys[0];
        const visibleEnd = dateKeys[dateKeys.length - 1];
        if (eventEnd < visibleStart || eventStart > visibleEnd) return;

        for (let rowIndex = 0; rowIndex < rows; rowIndex++) {
          const rowStartIndex = rowIndex * 7;
          const rowEndIndex = rowStartIndex + 6;
          const rowStartDate = dateKeys[rowStartIndex];
          const rowEndDate = dateKeys[rowEndIndex];
          const segStart = eventStart > rowStartDate ? eventStart : rowStartDate;
          const segEnd = eventEnd < rowEndDate ? eventEnd : rowEndDate;
          if (segStart > segEnd) continue;

          const startCell = cellMap[segStart];
          const endCell = cellMap[segEnd];
          if (!startCell || !endCell) continue;

          const slots = rowSlots[rowIndex];
          let slotIndex = slots.findIndex(ranges => !ranges.some(r => segStart <= r.end && segEnd >= r.start));
          if (slotIndex === -1) {
            slotIndex = slots.length;
            slots.push([]);
          }
          slots[slotIndex].push({ start: segStart, end: segEnd });

          const startLeft = startCell.offsetLeft;
          const endLeft = endCell.offsetLeft + endCell.offsetWidth;
          const top = startCell.offsetTop + 34 + slotIndex * 32;
          const left = startLeft + 2;
          const width = endLeft - startLeft - 4;

          const bar = document.createElement('div');
          bar.className = 'event-bar';
          bar.style.top = `${top}px`;
          bar.style.left = `${left}px`;
          bar.style.width = `${width}px`;
          const userColors = ev.users.map(u => userMeta[u]?.color).filter(Boolean);
          bar.style.background = userColors.length > 1
            ? `linear-gradient(90deg, ${userColors.join(', ')})`
            : (userColors[0] || typeMeta[ev.type]?.color || typeMeta.general.color);
          const namesLabel = ev.users.length >= Object.keys(userMeta).length
            ? '팀'
            : ev.users.map(u => userMeta[u]?.name).filter(Boolean).join(', ');
          const timeLabel = ev.allDay ? '' : `${ev.startTime} `;
          if (ev.type === 'external') {
            bar.textContent = ev.memo ? `${timeLabel}${ev.memo} - ${namesLabel}` : `${timeLabel}${namesLabel}`;
          } else {
            const memoLabel = ev.memo ? `${ev.memo} ` : '';
            bar.textContent = `${timeLabel}${memoLabel}${getTypeLabel(ev.type)} · ${namesLabel}`;
          }

          bar.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            e.preventDefault();
            const allCells = document.querySelectorAll('.day-cell');
            const sampleCell = allCells[0];
            const cellWidth = sampleCell ? sampleCell.offsetWidth : 100;
            let rowHeight = sampleCell ? sampleCell.offsetHeight : 100;
            if (allCells.length > 7) {
              rowHeight = allCells[7].getBoundingClientRect().top - allCells[0].getBoundingClientRect().top;
            }
            dragEventState = { active: true, eventId: ev.id, originalStart: ev.startDate, originalEnd: ev.endDate, startX: e.clientX, startY: e.clientY, lastDeltaDays: 0, bar, cellWidth, rowHeight };
            bar.classList.add('dragging');
          });

          bar.addEventListener('click', (e) => {
            if (dragEventState && dragEventState.active) return;
            e.stopPropagation();
            openModal(segStart, ev);
          });

          calendar.appendChild(bar);
        }
      });
    }

    function prevMonth() { currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1); loadEvents(); }
    function nextMonth() { currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1); loadEvents(); }
    function goToday() { currentDate = new Date(); loadEvents(); }

    function updateUserButtons() {
      document.querySelectorAll('.user-btn').forEach(btn => btn.classList.toggle('active', selectedUsers.includes(btn.dataset.user)));
    }

    function updateTypeButtons() {
      document.querySelectorAll('.type-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.type === selectedType));
    }

    function openModal(date, event, rangePreset) {
      const modal = document.getElementById('eventModal');
      const startTimeInput = document.getElementById('startTime');
      const endTimeInput = document.getElementById('endTime');
      const allDayCheckbox = document.getElementById('allDayCheckbox');
      const startDateInput = document.getElementById('startDate');
      const endDateInput = document.getElementById('endDate');
      const deleteBtn = document.getElementById('deleteBtn');
      const modalTitle = document.getElementById('modalTitle');

      editingEventId = event ? event.id : null;
      selectedUsers = event ? [...event.users] : ['yang'];
      selectedType = event?.type || 'general';
      updateUserButtons();
      updateTypeButtons();

      const startDate = rangePreset?.startDate || event?.startDate || date;
      const endDate = rangePreset?.endDate || event?.endDate || date;
      startDateInput.value = startDate;
      endDateInput.value = endDate;
      const isAllDay = event?.allDay || (!event?.startTime && !event?.endTime);
      allDayCheckbox.checked = isAllDay;
      startTimeInput.value = event?.startTime || '09:00';
      endTimeInput.value = event?.endTime || '10:00';
      startTimeInput.disabled = isAllDay;
      endTimeInput.disabled = isAllDay;
      document.getElementById('memo').value = event?.memo || '';
      modalTitle.textContent = event ? '일정 수정' : '새 일정 추가';
      deleteBtn.style.display = event ? 'inline-block' : 'none';

      modal.classList.add('active');
    }

    function closeModal() {
      document.getElementById('eventModal').classList.remove('active');
      editingEventId = null;
      document.getElementById('startDate').value = '';
      document.getElementById('endDate').value = '';
      document.getElementById('startTime').value = '09:00';
      document.getElementById('endTime').value = '10:00';
      document.getElementById('memo').value = '';
      document.getElementById('allDayCheckbox').checked = false;
      document.getElementById('startTime').disabled = false;
      document.getElementById('endTime').disabled = false;
      selectedType = 'general';
      updateTypeButtons();
    }

    async function saveEvent() {
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      const startTime = document.getElementById('allDayCheckbox').checked ? '' : document.getElementById('startTime').value;
      const endTime = document.getElementById('allDayCheckbox').checked ? '' : document.getElementById('endTime').value;
      const memo = document.getElementById('memo').value || '';

      if (!startDate || !endDate) { alert('시작/종료 날짜를 선택하세요.'); return; }
      if (startDate > endDate) { alert('종료 날짜는 시작 날짜보다 늦어야 합니다.'); return; }
      if (!document.getElementById('allDayCheckbox').checked && startDate === endDate && startTime >= endTime) { alert('종료 시간은 시작 시간보다 늦어야 합니다.'); return; }
      if (selectedUsers.length === 0) { alert('사용자를 한 명 이상 선택하세요.'); return; }

      const payload = { startDate, endDate, startTime, endTime, title: '', memo, users: [...selectedUsers], type: selectedType, allDay: document.getElementById('allDayCheckbox').checked };

      if (editingEventId) {
        await apiUpdateEvent(editingEventId, payload);
        events = events.map(ev => ev.id === editingEventId ? { ...ev, ...payload, id: editingEventId } : ev);
      } else {
        const created = await apiCreateEvent(payload);
        events.push(normalizeEvents([created])[0]);
      }
      // update local cache so page works offline / on GitHub Pages
      try {
        localStorage.setItem('monthlyScheduleEvents', JSON.stringify(events));
      } catch (e) {}
      closeModal();
      renderCalendar();
    }

    async function deleteCurrentEvent() {
      if (!editingEventId) return;
      const ok = confirm('이 일정을 삭제할까요?');
      if (!ok) return;

      await apiDeleteEvent(editingEventId);
      events = events.filter(ev => ev.id !== editingEventId);
      try { localStorage.setItem('monthlyScheduleEvents', JSON.stringify(events)); } catch (e) {}
      closeModal();
      renderCalendar();
    }

    function finalizeDragSelection() {
      if (!dragSelection || !dragSelection.active) return;
      const [startDate, endDate] = [dragSelection.startDate, dragSelection.endDate].sort();
      dragSelection = null;
      renderCalendar();
      openModal(startDate, null, { startDate, endDate });
    }

    document.getElementById('startTime').addEventListener('change', (e) => {
      const [h, m] = e.target.value.split(':').map(Number);
      if (Number.isNaN(h) || Number.isNaN(m)) return;
      const newHour = (h + 1) % 24;
      document.getElementById('endTime').value = `${String(newHour).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    });

    document.getElementById('allDayCheckbox').addEventListener('change', (e) => {
      const disabled = e.target.checked;
      document.getElementById('startTime').disabled = disabled;
      document.getElementById('endTime').disabled = disabled;
      if (disabled) { document.getElementById('startTime').value = '09:00'; document.getElementById('endTime').value = '10:00'; }
    });

    document.querySelectorAll('.user-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const user = btn.dataset.user;
        const idx = selectedUsers.indexOf(user);
        if (idx >= 0) selectedUsers.splice(idx, 1);
        else selectedUsers.push(user);
        updateUserButtons();
      });
    });

    document.querySelectorAll('.type-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedType = btn.dataset.type;
        updateTypeButtons();
      });
    });

    document.getElementById('eventModal').addEventListener('click', (e) => { if (e.target.id === 'eventModal') closeModal(); });

    document.addEventListener('mousemove', (e) => {
      if (!dragEventState || !dragEventState.active) return;
      e.preventDefault();
      const deltaX = e.clientX - dragEventState.startX;
      const deltaY = e.clientY - dragEventState.startY;
      const deltaCols = Math.round(deltaX / dragEventState.cellWidth);
      const deltaRows = Math.round(deltaY / dragEventState.rowHeight);
      const deltaDays = deltaCols + deltaRows * 7;
      if (deltaDays === dragEventState.lastDeltaDays) return;
      dragEventState.lastDeltaDays = deltaDays;
      dragEventState.bar.style.transform = `translate(${deltaCols * dragEventState.cellWidth}px, ${deltaRows * dragEventState.rowHeight}px)`;
    });

    document.addEventListener('mouseup', async (e) => {
      if (dragEventState && dragEventState.active) {
        dragEventState.bar.classList.remove('dragging');
        dragEventState.bar.style.transform = '';
        const deltaDays = dragEventState.lastDeltaDays;
        if (deltaDays !== 0) {
          const id = dragEventState.eventId;
          if (e.ctrlKey) {
            const sourceEvent = events.find(ev => ev.id === id);
            if (sourceEvent) {
              const newStart = addDays(sourceEvent.startDate, deltaDays);
              const newEnd = addDays(sourceEvent.endDate, deltaDays);
              const payload = { ...sourceEvent, startDate: newStart, endDate: newEnd };
              delete payload.id;
              const created = await apiCreateEvent(payload);
              events.push(normalizeEvents([created])[0]);
              try { localStorage.setItem('monthlyScheduleEvents', JSON.stringify(events)); } catch (err) {}
              renderCalendar();
            }
          } else {
            events = events.map(ev => {
              if (ev.id !== id) return ev;
              const newStart = addDays(ev.startDate, deltaDays);
              const newEnd = addDays(ev.endDate, deltaDays);
              const updated = { ...ev, startDate: newStart, endDate: newEnd };
              apiUpdateEvent(id, updated);
              return updated;
            });
            renderCalendar();
          }
        }
        dragEventState = null;
      }
      finalizeDragSelection();
    });

    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { const modal = document.getElementById('eventModal'); if (modal.classList.contains('active')) closeModal(); } });

    loadEvents();
  </script>
</body>
</html>
